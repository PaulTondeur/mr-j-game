<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Mr. J's Game</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; width: 100dvw; height: 100dvh; background: #000; position: fixed; top: 0; left: 0; }
    canvas { position: fixed !important; top: 0 !important; left: 0 !important; width: 100dvw !important; height: 100dvh !important; display: block; }
    #hud {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      pointer-events: none;
      font-family: monospace;
      z-index: 10;
    }
    #hud-balk {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 12px 20px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
    }
    #level-naam {
      color: white; font-size: 20px; font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
    }
    #score {
      color: #ffd700; font-size: 20px; font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
    }
    #levens {
      font-size: 22px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
    }
    #gezondheid {
      display: flex; align-items: center; gap: 4px;
      color: white; font-size: 14px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
    }
    .hp-blok { width: 18px; height: 18px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.3); transition: background 0.2s; }
    #bericht {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: white; font-size: 28px; font-weight: bold;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.9);
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="hud-balk">
      <div id="level-naam"></div>
      <div id="score"></div>
      <div id="gezondheid"></div>
      <div id="levens"></div>
    </div>
    <div id="bericht"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
